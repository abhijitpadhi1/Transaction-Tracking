<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - FinanceFlow</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="assets/js/config.js"></script>
  </head>
  <body class="bg-black min-h-screen lg:overflow-hidden">
    <!-- Desktop Layout: Centered Frame with Illustration and Form -->
    <div class="hidden lg:flex h-screen items-center justify-center p-12">
      <!-- Rectangular Frame Container -->
      <div
        class="bg-gray-900 rounded-lg border border-gray-800 shadow-2xl overflow-hidden flex w-full max-w-5xl"
      >
        <!-- Left Illustration Panel (Inside Frame) -->
        <div
          class="w-2/5 bg-gradient-to-br from-purple-900 via-pink-900 to-red-900 relative overflow-hidden border-r-4 border-orange-500"
        >
          <!-- Network Illustration -->
          <div class="absolute inset-0 opacity-60">
            <svg
              class="w-full h-full"
              viewBox="0 0 400 600"
              preserveAspectRatio="none"
            >
              <!-- Network lines -->
              <line
                x1="50"
                y1="150"
                x2="150"
                y2="200"
                stroke="#a855f7"
                stroke-width="3"
                class="glow"
              />
              <line
                x1="150"
                y1="200"
                x2="250"
                y2="180"
                stroke="#ec4899"
                stroke-width="3"
                class="glow"
              />
              <line
                x1="250"
                y1="180"
                x2="350"
                y2="220"
                stroke="#a855f7"
                stroke-width="3"
                class="glow"
              />
              <line
                x1="100"
                y1="300"
                x2="200"
                y2="280"
                stroke="#ec4899"
                stroke-width="3"
                class="glow"
              />
              <line
                x1="200"
                y1="280"
                x2="300"
                y2="320"
                stroke="#a855f7"
                stroke-width="3"
                class="glow"
              />
              <line
                x1="150"
                y1="200"
                x2="200"
                y2="280"
                stroke="#ec4899"
                stroke-width="2"
                class="glow"
              />

              <!-- Hexagonal node with C (Currency) -->
              <g transform="translate(150, 200)">
                <polygon
                  points="-20,-15 20,-15 30,0 20,15 -20,15 -30,0"
                  fill="none"
                  stroke="#f97316"
                  stroke-width="2"
                  class="glow"
                />
                <text
                  x="0"
                  y="5"
                  text-anchor="middle"
                  fill="#f97316"
                  font-size="16"
                  font-weight="bold"
                >
                  C
                </text>
              </g>

              <!-- Circular node with lock icon -->
              <g transform="translate(250, 180)">
                <circle
                  r="18"
                  fill="none"
                  stroke="#f97316"
                  stroke-width="2"
                  class="glow"
                />
                <text
                  x="0"
                  y="5"
                  text-anchor="middle"
                  fill="#f97316"
                  font-size="12"
                >
                  🔒
                </text>
              </g>

              <!-- Circular node with D -->
              <g transform="translate(200, 280)">
                <circle
                  r="18"
                  fill="none"
                  stroke="#f97316"
                  stroke-width="2"
                  class="glow"
                />
                <text
                  x="0"
                  y="5"
                  text-anchor="middle"
                  fill="#f97316"
                  font-size="16"
                  font-weight="bold"
                >
                  D
                </text>
              </g>

              <!-- Additional nodes -->
              <circle
                cx="50"
                cy="150"
                r="12"
                fill="#a855f7"
                opacity="0.6"
                class="glow"
              />
              <circle
                cx="100"
                cy="300"
                r="12"
                fill="#ec4899"
                opacity="0.6"
                class="glow"
              />
              <circle
                cx="300"
                cy="320"
                r="12"
                fill="#a855f7"
                opacity="0.6"
                class="glow"
              />
              <circle
                cx="350"
                cy="220"
                r="12"
                fill="#ec4899"
                opacity="0.6"
                class="glow"
              />
            </svg>
          </div>
        </div>

        <!-- Right Login Form Section (Inside Frame) -->
        <div class="w-3/5 p-8 flex flex-col justify-center">
          <h2 class="text-white text-3xl font-bold mb-2">Welcome Back</h2>
          <p class="text-gray-400 mb-8">
            Log in to continue managing your finances.
          </p>

          <form id="loginForm" class="space-y-5">
            <!-- Email or User ID -->
            <div>
              <label
                for="emailOrUserid"
                class="block text-white text-sm font-medium mb-2"
                >Email or User ID</label
              >
              <div class="relative">
                <i
                  class="fas fa-envelope absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"
                ></i>
                <input
                  type="text"
                  id="emailOrUserid"
                  name="emailOrUserid"
                  placeholder="Enter your email or user ID"
                  required
                  class="input-box pl-10"
                />
              </div>
            </div>

            <!-- Password -->
            <div>
              <label
                for="password"
                class="block text-white text-sm font-medium mb-2"
                >Password</label
              >
              <div class="relative">
                <i
                  class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"
                ></i>
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Enter your password"
                  required
                  class="input-box pl-10"
                />
              </div>
              <div class="text-right mt-2">
                <a
                  href="#"
                  class="text-blue-500 hover:text-blue-600 text-sm font-medium"
                  >Forgot Password?</a
                >
              </div>
            </div>

            <!-- Login Button -->
            <!-- Inline form error (desktop) -->
            <div
              id="loginError"
              class="text-red-400 text-sm mb-2"
              style="display: none"
            ></div>

            <button
              type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors duration-200"
            >
              Login
            </button>
          </form>

          <!-- OR Separator -->
          <div class="flex items-center my-6">
            <div class="flex-1 border-t border-gray-700"></div>
            <span class="px-4 text-gray-400 text-sm">OR</span>
            <div class="flex-1 border-t border-gray-700"></div>
          </div>

          <!-- Signup Link -->
          <p class="text-center text-gray-400">
            Don't have an account?
            <a
              href="signup.html"
              class="text-blue-500 hover:text-blue-600 font-bold"
              >Create an Account</a
            >
          </p>
        </div>
      </div>
    </div>

    <!-- Mobile Layout: Full Screen -->
    <div class="lg:hidden min-h-screen bg-black flex flex-col px-6 py-8">
      <!-- App Icon and Header -->
      <div class="text-center mb-8">
        <div
          class="w-20 h-20 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4"
        >
          <svg
            class="w-12 h-12 text-white"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"
            />
          </svg>
        </div>
        <h1 class="text-white text-3xl font-bold mb-2">Welcome Back</h1>
        <p class="text-gray-400 text-sm">
          Log in to continue tracking your expenses
        </p>
      </div>

      <!-- Form -->
      <form id="loginFormMobile" class="flex-1 space-y-4">
        <!-- User ID / Email -->
        <div>
          <label
            for="emailOrUseridMobile"
            class="block text-white text-sm font-medium mb-2"
            >User ID / Email</label
          >
          <input
            type="text"
            id="emailOrUseridMobile"
            name="emailOrUserid"
            placeholder="Enter your User ID or Email"
            required
            class="input-box"
          />
        </div>

        <!-- Password -->
        <div>
          <label
            for="passwordMobile"
            class="block text-white text-sm font-medium mb-2"
            >Password</label
          >
          <input
            type="password"
            id="passwordMobile"
            name="password"
            placeholder="Enter your password"
            required
            class="input-box"
          />
          <div class="text-right mt-2">
            <a
              href="#"
              class="text-blue-500 hover:text-blue-600 text-sm font-medium"
              >Forgot Password?</a
            >
          </div>
        </div>

        <!-- Inline form error (mobile) -->
        <div
          id="loginError"
          class="text-red-400 text-sm mb-2"
          style="display: none"
        ></div>

        <!-- Login Button -->
        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors duration-200 mt-6"
        >
          Login
        </button>
      </form>

      <!-- OR Separator -->
      <div class="flex items-center my-6">
        <div class="flex-1 border-t border-gray-700"></div>
        <span class="px-4 text-gray-400 text-sm">OR</span>
        <div class="flex-1 border-t border-gray-700"></div>
      </div>

      <!-- Create Account Link -->
      <p class="text-center text-gray-400 text-sm mb-6">
        <a
          href="signup.html"
          class="text-blue-500 hover:text-blue-600 font-medium"
          >Create an Account</a
        >
      </p>

      <!-- Footer -->
      <div
        class="text-white text-xs opacity-70 flex items-center justify-center space-x-1 mt-auto"
      >
        <span>Made with</span>
        <span class="text-purple-400 font-bold">A</span>
      </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
      // Handle form submission for both desktop and mobile
      document
        .getElementById("loginForm")
        ?.addEventListener("submit", function (e) {
          e.preventDefault();
          const credentials = {
            username: document.getElementById("emailOrUserid").value,
            password: document.getElementById("password").value,
          };
          login(credentials);
        });

      document
        .getElementById("loginFormMobile")
        ?.addEventListener("submit", function (e) {
          e.preventDefault();
          const credentials = {
            username: document.getElementById("emailOrUseridMobile").value,
            password: document.getElementById("passwordMobile").value,
          };
          login(credentials);
        });
    </script>
    <style>
      /* Glow effect for network illustration */
      .glow {
        filter: drop-shadow(0 0 4px currentColor);
      }
    </style>
  </body>
</html>
